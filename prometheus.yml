global:
  scrape_interval: 5s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "host.docker.internal:9093"

scrape_configs:
  - job_name: "mern-backend"
    static_configs:
      - targets: ["host.docker.internal:4000"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["host.docker.internal:9100"]